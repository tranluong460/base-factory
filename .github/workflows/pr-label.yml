name: PR Auto Label

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-by-files:
    name: Label by Changed Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  label-by-size:
    name: Label by PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Label PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const changes = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            let label;
            if (changes < 10) label = 'size/XS';
            else if (changes < 50) label = 'size/S';
            else if (changes < 200) label = 'size/M';
            else if (changes < 500) label = 'size/L';
            else label = 'size/XL';

            // Remove old size labels
            const currentLabels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })).data.map(l => l.name);

            for (const old of sizeLabels) {
              if (currentLabels.includes(old) && old !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }
            }

            // Add new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            // Warn on XL PRs
            if (label === 'size/XL') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Large PR detected** (${changes} lines changed). Consider splitting into smaller PRs for easier review.`,
              });
            }
