name: Update Version and Sync to Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # JOB 1: Tăng version và cập nhật ngày tháng trên nhánh main
  bump-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=$(jq -r .version package.json)

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          if [ "$MINOR" -eq 9 ] && [ "$PATCH" -eq 9 ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$PATCH" -eq 9 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # update version + lastUpdated
          CURRENT_DATE=$(date +'%d/%m/%Y')
          jq ".version=\"$NEW_VERSION\" | .lastUpdated=\"$CURRENT_DATE\"" package.json > tmp.json
          mv tmp.json package.json

          echo "New version: $NEW_VERSION"

          git add package.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"

          git pull --rebase origin main
          git push origin main

  # JOB 2: Copy dist và các file liên quan sang nhánh prod
  deploy-prod:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Lấy version để dùng làm commit message
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Prod Folder 📂
        run: |
          mkdir -p out/dist

          if [ -d "dist" ]; then cp -r dist/* out/dist/; fi

          cp package.json out/
          cp README.md out/
          cp LICENSE out/ || echo "No LICENSE found"
          cp .gitignore out/

          if [ -d "docs" ]; then cp -r docs out/docs; fi

      - name: Deploy to Prod Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: prod
          clean: true
          commit-message: ${{ steps.get_version.outputs.VERSION }}
